<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#222222" />
<title>Wage Tracker</title>

<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />

<!-- iOS PWA -->
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>

<div id="app">

<header>
<button id="prevMonth">‹</button>
<h1 id="monthLabel"></h1>
<button id="nextMonth">›</button>
</header>

<div id="calendar"></div>

<div class="totals">
<div>Total Hours: <span id="totalHours">0</span></div>
<div>Total Earnings: <span id="totalEarnings">€0.00</span></div>
</div>

</div>

<!-- Day Entry Modal -->
<div id="entryModal" class="modal hidden">
<div class="modal-content">

<h2 id="entryDate" class="center-text"></h2>

<label>Start Time
<input type="time" id="startTime" value="16:00">
</label>

<label>End Time
<input type="time" id="endTime" value="22:00">
</label>

<label>Break (minutes)
<input type="number" id="breakTime" value="30" min="0" step="1" pattern="[0-9]*" inputmode="numeric">
</label>

<label>Hourly Wage (€)
<input type="number" id="hourlyWage" value="6.60" step="0.01" pattern="[0-9]*" inputmode="decimal">
</label>

<div class="result">
Worked: <span id="workedHours">0</span> h<br>
Earned: <span id="dailyEarnings">€0.00</span>
</div>

<div class="modal-buttons">
<button id="saveEntry">Save</button>
<button id="deleteEntry" class="danger">Delete</button>
<button id="unavailableEntry" class="danger">Unavailable</button>
<button id="closeModal" class="secondary">Cancel</button>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
