<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shift Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<button id="prevMonth" class="secondary">‹</button>
<div id="monthLabel"></div>
<button id="nextMonth" class="secondary">›</button>
</header>

<div class="weekdays">
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>
<div>Sun</div>
</div>

<div id="calendar"></div>

<div class="totals">
<div>Total Hours: <span id="totalHours">0</span></div>
<div>Total Earnings: <span id="totalEarnings">0€</span></div>
</div>

<div id="entryModal" class="modal hidden">
<div class="modal-content">

<h3 id="entryDate" class="center-text"></h3>

<label>Start</label>
<input type="time" id="startTime">

<label>End</label>
<input type="time" id="endTime">

<div class="break-row">
<label>
<input type="checkbox" id="breakToggle" checked>
30 min break
</label>
</div>

<label>Hourly €</label>
<input type="number" id="hourlyWage" step="0.01">

<p>Hours: <span id="workedHours">0</span></p>
<p>Earnings: <span id="dailyEarnings">0€</span></p>

<div class="modal-buttons">
<button id="saveEntry">Save</button>
<button id="deleteEntry" class="danger">Delete</button>
<button id="unavailableEntry" class="danger-dark">Unavailable</button>
<button id="closeModal" class="secondary">Close</button>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
