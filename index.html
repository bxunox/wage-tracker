<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#111827" />
<title>Wage Tracker</title>

<link rel="stylesheet" href="style.css" />
<link rel="manifest" href="manifest.json" />

<!-- iOS support -->
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

</head>
<body>

<div id="app">

<header>
<button id="prevMonth">‹</button>
<h1 id="monthLabel"></h1>
<button id="nextMonth">›</button>
</header>

<div id="calendar"></div>

<div class="totals">
<div>Total Hours: <span id="totalHours">0</span></div>
<div>Total Earnings: <span id="totalEarnings">€0.00</span></div>
</div>

<button id="openTemplates" class="secondary">Templates</button>

</div>

<!-- Day Entry Modal -->
<div id="entryModal" class="modal hidden">
<div class="modal-content">

<h2 id="entryDate"></h2>

<label>Start Time
<input type="time" id="startTime" value="16:00">
</label>

<label>End Time
<input type="time" id="endTime" value="22:00">
</label>

<label>Break (minutes)
<input type="number" id="breakTime" value="30" min="0">
</label>

<label>Hourly Wage (€)
<input type="number" id="hourlyWage" value="6.60" step="0.01">
</label>

<div class="result">
Worked: <span id="workedHours">0</span> h<br>
Earned: <span id="dailyEarnings">€0.00</span>
</div>

<div class="modal-buttons">
<button id="saveEntry">Save</button>
<button id="deleteEntry" class="danger">Delete</button>
<button id="closeModal" class="secondary">Cancel</button>
</div>

</div>
</div>

<!-- Templates Modal -->
<div id="templatesModal" class="modal hidden">
<div class="modal-content">
<h2>Templates</h2>

<div id="templatesList"></div>

<button id="addTemplate">+ Add Template</button>
<button id="closeTemplates" class="secondary">Close</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
