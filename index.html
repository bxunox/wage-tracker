<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wage Tracker</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1c1e">
</head>
<body>

<div class="app">

<header>
  <button id="prevMonth">‹</button>
  <h1 id="monthLabel"></h1>
  <button id="nextMonth">›</button>
</header>

<div class="weekdays">
  <div>Mon</div>
  <div>Tue</div>
  <div>Wed</div>
  <div>Thu</div>
  <div>Fri</div>
  <div>Sat</div>
  <div>Sun</div>
</div>

<div id="calendar" class="calendar"></div>

<div class="totals">
  <div>Total Hours: <span id="totalHours">0</span></div>
  <div>Total Earnings: <span id="totalEarnings">0€</span></div>
</div>

</div>

<!-- Modal -->
<div id="entryModal" class="modal hidden">
  <div class="modal-content">

    <h2 id="entryDate"></h2>

    <div class="input-group">
      <label>Start</label>
      <input type="time" id="startTime">
    </div>

    <div class="input-group">
      <label>End</label>
      <input type="time" id="endTime">
    </div>

    <div class="input-group">
      <label>Break (min)</label>
      <input type="number" id="breakTime" min="0" step="5">
    </div>

    <div class="input-group">
      <label>Hourly (€)</label>
      <input type="number" id="hourlyWage" step="0.01">
    </div>

    <div class="result-box">
      <div>Worked: <span id="workedHours">0</span>h</div>
      <div>Earned: <span id="dailyEarnings">0€</span></div>
    </div>

    <div class="modal-buttons">
      <button id="saveEntry" class="btn save">Save</button>
      <button id="deleteEntry" class="btn delete">Delete</button>
      <button id="unavailableEntry" class="btn unavailable">Unavailable</button>
      <button id="closeModal" class="btn close">Close</button>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
